<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Animated Navigation Flow</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
<style>
  body, html { margin:0; padding:0; overflow:hidden; font-family:sans-serif; }

  .container { position:relative; width:100vw; height:100vh; }

  .background { position:absolute; width:100%; height:100%; object-fit:cover; z-index:0; }

  .character {
    position:absolute;
    bottom:0;
    left:0; /* ensure visible anchor */
    height:100vh;
    width:auto;
    transform-origin:bottom center;
    z-index:3;
    will-change:transform;
    display:block;
  }

  .nav {
    position:absolute;
    top:0;
    width:100%;
    height:100px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    z-index:4;
  }

  .tab {
    cursor:pointer;
    padding:10px 20px;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
    backdrop-filter:blur(10px);
  }

  .wallet {
    position:absolute;
    top:20px;
    right:20px;
    z-index:5;
    padding:10px 16px;
    border-radius:10px;
    background:rgba(0,0,0,0.6);
    color:white;
    cursor:pointer;
  }

  /* CHARACTER CARD */
  .card {
    position:absolute;
    bottom:120px;
    left:60px;
    width:320px;
    padding:20px;
    background:rgba(0,0,0,0.7);
    border-radius:16px;
    color:white;
    opacity:0;
    transform:translateY(40px) scale(0.95);
    transition:all 0.5s cubic-bezier(0.22,1,0.36,1);
    z-index:2;
  }

  .card.show {
    opacity:1;
    transform:translateY(0) scale(1);
  }

  .card img {
    width:100%;
    border-radius:10px;
    margin-bottom:10px;
  }

</style>
</head>
<body>
<div class="container">
  <img src="https://ipfs.io/ipfs/bafybeihkhckfk72hi77yrr3sf7leby5agmsq5cpdvel65vw43cb6bx2zb4" class="background" />

  <div class="card" id="nftCard">
    <img id="nftImage" />
    <div id="nftMeta">No NFT Loaded</div>
  </div>

  <img id="character" class="character" src="https://ipfs.io/ipfs/bafkreifdy25dy7oywuhwauo2y7jacny3lghk2vficddvbwx2rpy6f4zxqu" />

  <div class="wallet" id="walletBtn">Connect Wallet</div>

  <div class="nav">
    <div class="tab" data-index="0">Home</div>
    <div class="tab" data-index="1">Games</div>
    <div class="tab" data-index="2">Marketplace</div>
    <div class="tab" data-index="3">Profile</div>
  </div>
</div>

<script>
const character = document.getElementById('character');
const tabs = document.querySelectorAll('.tab');
const walletBtn = document.getElementById('walletBtn');
const card = document.getElementById('nftCard');
const nftImage = document.getElementById('nftImage');
const nftMeta = document.getElementById('nftMeta');

let currentIndex = 0;
let walletAddress = null;

const assets = {
  left1: "https://ipfs.io/ipfs/bafkreiheo32ehfntwpmxcars2ta4mq3hqhoheqzsr6ygyuyccbvjwpie7e",
  left2: "https://ipfs.io/ipfs/bafkreifcpvhdaydz64st2ozhwh4ltgzo6dschjd4ehxtmwiqeuphlcfsby",
  right1: "https://ipfs.io/ipfs/bafkreifdy25dy7oywuhwauo2y7jacny3lghk2vficddvbwx2rpy6f4zxqu",
  right2: "https://ipfs.io/ipfs/bafkreic7tlur3ycl2r3zjuuxbghhfihucexc3biucb753j2576ltrogptq",
  flip: "https://ipfs.io/ipfs/bafkreic6iy37nlapsjm2tgvfzb72fkop47lgwwthjaomyg7sl63pp7lcgy"
};

// START STATE: HOME facing RIGHT
character.src = assets.right1;

function getTabX(index) {
  const tab = tabs[index];
  const rect = tab.getBoundingClientRect();
  return rect.left + rect.width / 2 - character.offsetWidth / 2;
}

window.addEventListener('load', () => {
  // ensure image is loaded before positioning
  const setInitialPosition = () => {
    const x = getTabX(0);
    character.style.transform = `translateX(${x}px)`;
  };

  if (character.complete) {
    setInitialPosition();
  } else {
    character.onload = setInitialPosition;
  }
});

function animateCharacter(targetIndex) {
  if (targetIndex === currentIndex) return;

  card.classList.remove('show');

  const goingRight = targetIndex > currentIndex;

  const walkFrames = goingRight
    ? [assets.right1, assets.right2]
    : [assets.left1, assets.left2];

  let frame = 0;
  let running = true;

  function walkLoop() {
    if (!running) return;
    character.src = walkFrames[frame % 2];
    frame++;
    setTimeout(() => requestAnimationFrame(walkLoop), 140);
  }

  walkLoop();

  const distance = Math.abs(targetIndex - currentIndex);
  const duration = 1000 + distance * 500;

  character.style.transition = `transform ${duration}ms linear`;
  character.style.transform = `translateX(${getTabX(targetIndex)}px)`;

  setTimeout(() => {
    running = false;

    character.src = assets.flip;

    setTimeout(() => {
      // FIXED ORIENTATION LOGIC
      if (targetIndex === 0) {
        character.src = assets.left1; // HOME faces LEFT
      } else if (targetIndex === 3) {
        character.src = assets.left1; // PROFILE faces LEFT toward card
        showProfileCard();
      } else {
        character.src = assets.right1;
      }

      currentIndex = targetIndex;
    }, 250);

  }, duration);
}

function showProfileCard() {
  if (!walletAddress) return;

  nftMeta.innerText = "Loading...";

  fetch(`/api/opensea?address=${walletAddress}`)
    .then(res => res.json())
    .then(data => {
      const nft = data.nfts?.[0];

      if (!nft) {
        nftMeta.innerText = "No NFT Found";
        return;
      }

      nftImage.src = nft.image;
      nftMeta.innerText = nft.name;

      setTimeout(() => card.classList.add('show'), 200);
    })
    .catch(err => {
      console.error("NFT LOAD ERROR", err);
      nftMeta.innerText = "Error loading NFT";
    });
}

      nftImage.src = nft.image;
      nftMeta.innerText = nft.name;

      setTimeout(() => card.classList.add('show'), 200);
    })
    .catch(err => {
      console.error("NFT LOAD ERROR", err);
      nftMeta.innerText = "Error loading NFT";
    });
}
</script>
</body>
</html>
